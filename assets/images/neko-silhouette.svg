<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Abstract cat silhouette with stars - tribute style, original artwork -->
  <defs>
    <linearGradient id="catGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8d8ea"/>
      <stop offset="50%" stop-color="#c5e3f0"/>
      <stop offset="100%" stop-color="#dfeef8"/>
    </linearGradient>
    <radialGradient id="aura">
      <stop offset="0%" stop-color="#e8f4fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e8f4fd" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Aura -->
  <circle cx="150" cy="160" r="120" fill="url(#aura)"/>
  <!-- Cat body silhouette -->
  <ellipse cx="150" cy="200" rx="60" ry="70" fill="url(#catGrad)" filter="url(#softGlow)"/>
  <!-- Cat head -->
  <circle cx="150" cy="130" r="45" fill="url(#catGrad)" filter="url(#softGlow)"/>
  <!-- Left ear -->
  <path d="M115 100 L100 55 L130 85 Z" fill="url(#catGrad)" filter="url(#softGlow)"/>
  <!-- Right ear -->
  <path d="M185 100 L200 55 L170 85 Z" fill="url(#catGrad)" filter="url(#softGlow)"/>
  <!-- Inner ears -->
  <path d="M118 95 L108 65 L128 87 Z" fill="#d4eeff" opacity="0.6"/>
  <path d="M182 95 L192 65 L172 87 Z" fill="#d4eeff" opacity="0.6"/>
  <!-- Eyes -->
  <ellipse cx="135" cy="125" rx="8" ry="9" fill="#5a8fa8" opacity="0.7"/>
  <ellipse cx="165" cy="125" rx="8" ry="9" fill="#5a8fa8" opacity="0.7"/>
  <circle cx="133" cy="122" r="3" fill="white" opacity="0.8"/>
  <circle cx="163" cy="122" r="3" fill="white" opacity="0.8"/>
  <!-- Nose -->
  <path d="M147 138 L150 142 L153 138 Z" fill="#89b8d0" opacity="0.6"/>
  <!-- Whiskers -->
  <line x1="100" y1="135" x2="130" y2="138" stroke="#89b8d0" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="142" x2="130" y2="142" stroke="#89b8d0" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="135" x2="170" y2="138" stroke="#89b8d0" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="142" x2="170" y2="142" stroke="#89b8d0" stroke-width="1" opacity="0.4"/>
  <!-- Tail -->
  <path d="M210 200 Q240 170 230 140 Q225 125 235 115" stroke="url(#catGrad)" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#softGlow)"/>
  <!-- Surrounding stars -->
  <polygon points="80,50 83,58 91,58 85,63 87,71 80,66 73,71 75,63 69,58 77,58" fill="#ffd700" opacity="0.7"/>
  <polygon points="230,40 232,46 238,46 233,50 235,56 230,52 225,56 227,50 222,46 228,46" fill="#ffd700" opacity="0.6"/>
  <polygon points="150,30 152,36 158,36 153,40 155,46 150,42 145,46 147,40 142,36 148,36" fill="#ffd700" opacity="0.8"/>
  <circle cx="70" cy="90" r="2" fill="#ffd700" opacity="0.5"/>
  <circle cx="240" cy="85" r="1.5" fill="#ffd700" opacity="0.4"/>
  <!-- Musical notes -->
  <text x="55" y="120" font-size="16" fill="#89b8d0" opacity="0.5">♪</text>
  <text x="240" y="110" font-size="14" fill="#89b8d0" opacity="0.4">♫</text>
</svg>
