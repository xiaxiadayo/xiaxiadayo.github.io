<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Starry sky background pattern - original artwork -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6f8"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <radialGradient id="star">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="400" fill="url(#skyGrad)"/>
  <!-- Stars scattered -->
  <circle cx="50" cy="30" r="2" fill="white" opacity="0.9"/>
  <circle cx="150" cy="80" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="250" cy="20" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="350" cy="60" r="1" fill="white" opacity="0.6"/>
  <circle cx="450" cy="40" r="2" fill="white" opacity="0.9"/>
  <circle cx="550" cy="90" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="650" cy="25" r="2" fill="white" opacity="0.85"/>
  <circle cx="750" cy="70" r="1.8" fill="white" opacity="0.75"/>
  <circle cx="100" cy="120" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="300" cy="150" r="2" fill="white" opacity="0.8"/>
  <circle cx="500" cy="130" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="700" cy="110" r="1" fill="white" opacity="0.65"/>
  <circle cx="200" cy="200" r="1.8" fill="white" opacity="0.5"/>
  <circle cx="400" cy="180" r="2.2" fill="white" opacity="0.6"/>
  <circle cx="600" cy="220" r="1.3" fill="white" opacity="0.55"/>
  <!-- Moon -->
  <circle cx="680" cy="60" r="30" fill="#fff8dc" opacity="0.4"/>
  <circle cx="690" cy="55" r="26" fill="url(#skyGrad)" opacity="0.6"/>
</svg>
