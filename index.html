<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夏夏的小世界</title>
  <meta name="description" content="一个安静的角落" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="no-scroll">

  <!-- ===== Entry Overlay ===== -->
  <div id="entryOverlay" class="entry-overlay">
    <div class="entry-content">
      <div class="entry-icon">✦</div>
      <p class="entry-text">点击进入</p>
    </div>
  </div>

  <!-- ===== Page Content (circle-reveal animated) ===== -->
  <div id="pageContent" class="page-content">

    <!-- ===== Hero / Welcome ===== -->
    <section class="hero">
      <div class="hero-particles" id="heroParticles"></div>
      <div class="hero-inner fade-in">
        <h1 class="hero-title">你好呀 ✿</h1>
        <p class="hero-subtitle">这里是夏夏的角落</p>
        <p class="hero-desc">一个安安静静的地方，存放一些碎片。</p>
      </div>
    </section>

    <!-- ===== Photo Grid ===== -->
    <section class="section">
      <h2 class="section-title fade-in">一些瞬间</h2>
      <div class="photo-grid fade-in">
        <div class="photo-item"><img src="https://picsum.photos/seed/xia1/300/300" alt="瞬间" loading="lazy" /></div>
        <div class="photo-item"><img src="https://picsum.photos/seed/xia2/300/300" alt="瞬间" loading="lazy" /></div>
        <div class="photo-item"><img src="https://picsum.photos/seed/xia3/300/300" alt="瞬间" loading="lazy" /></div>
        <div class="photo-item"><img src="https://picsum.photos/seed/xia4/300/300" alt="瞬间" loading="lazy" /></div>
        <div class="photo-item"><img src="https://picsum.photos/seed/xia5/300/300" alt="瞬间" loading="lazy" /></div>
        <div class="photo-item"><img src="https://picsum.photos/seed/xia6/300/300" alt="瞬间" loading="lazy" /></div>
        <div class="photo-item"><img src="https://picsum.photos/seed/xia7/300/300" alt="瞬间" loading="lazy" /></div>
        <div class="photo-item"><img src="https://picsum.photos/seed/xia8/300/300" alt="瞬间" loading="lazy" /></div>
      </div>
    </section>

    <!-- ===== Musings 碎碎念 (4 columns) ===== -->
    <section class="section">
      <h2 class="section-title fade-in">碎碎念</h2>
      <div class="musings-grid fade-in">
        <div class="musing-card">
          <div class="musing-emoji">☁️</div>
          <p class="musing-text">今天的天空很蓝，适合什么都不想。</p>
          <span class="musing-date">三月的某天</span>
        </div>
        <div class="musing-card">
          <div class="musing-emoji">🌧️</div>
          <p class="musing-text">下雨天窝在家里听歌，世界安静了好多。</p>
          <span class="musing-date">雨天</span>
        </div>
        <div class="musing-card">
          <div class="musing-emoji">🐱</div>
          <p class="musing-text">路边的猫咪对我眨了眨眼，算是打过招呼了吧。</p>
          <span class="musing-date">散步时</span>
        </div>
        <div class="musing-card">
          <div class="musing-emoji">🌙</div>
          <p class="musing-text">晚安，不管你是谁，希望你也能睡个好觉。</p>
          <span class="musing-date">深夜</span>
        </div>
      </div>
    </section>

    <!-- ===== Likes ===== -->
    <section class="section likes-section">
      <h2 class="section-title fade-in">喜欢的事</h2>
      <div class="likes-grid fade-in">
        <span class="like-tag">♪ 音乐</span>
        <span class="like-tag">☁ 发呆</span>
        <span class="like-tag">🐱 猫咪</span>
        <span class="like-tag">📖 阅读</span>
        <span class="like-tag">🌧 雨天</span>
        <span class="like-tag">✿ 花花</span>
        <span class="like-tag">🍵 奶茶</span>
        <span class="like-tag">🌅 日落</span>
      </div>
    </section>

    <!-- ===== Footer ===== -->
    <footer class="footer">
      <p>© 2024 – 2026 夏夏</p>
    </footer>
  </div>

  <!-- ===== Music Player (fixed widget) ===== -->
  <div id="musicPlayer" class="music-player hidden">
    <button id="musicToggle" class="music-toggle" aria-label="播放/暂停">
      <span class="music-icon" id="musicIcon">▶</span>
    </button>
    <div class="music-info">
      <div class="music-title">Shelter</div>
      <div class="music-artist">Porter Robinson &amp; Madeon</div>
    </div>
    <div class="music-eq" id="musicEq">
      <span class="eq-bar"></span>
      <span class="eq-bar"></span>
      <span class="eq-bar"></span>
      <span class="eq-bar"></span>
    </div>
  </div>

  <!-- ===== Cat Pet (fixed bottom-right) ===== -->
  <div id="catPet" class="cat-pet hidden" title="摸摸我~">
    <div class="cat-bubble" id="catBubble"></div>
    <pre class="cat-art" id="catArt">  ∧,,,∧
( ̳• · • ̳)
 /    づ♡</pre>
  </div>

  <!-- ===== Background Music ===== -->
  <audio id="bgMusic" loop preload="auto">
    <source src="/assets/music/shelter.mp3" type="audio/mpeg" />
  </audio>

  <script src="/assets/js/main.js"></script>
</body>
</html>
