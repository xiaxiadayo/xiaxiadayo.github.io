<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夏夏的留言板</title>
  <meta name="description" content="夏夏的公共留言板 — 欢迎留言" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon.ico" sizes="32x32" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ===== Navigation ===== -->
  <nav class="navbar" id="navbar">
    <div class="nav-content">
      <a href="#" class="nav-logo">夏夏的留言板</a>
      <div class="nav-right">
        <span id="mbAdminStatus" class="admin-status"></span>
        <button class="btn btn-small" id="mbAdminBtn">管理</button>
      </div>
    </div>
  </nav>

  <!-- ===== Hero ===== -->
  <section class="hero">
    <div class="hero-content">
      <h1>留言板</h1>
      <p class="subtitle">在这里留下你想说的话，所有人都能看到。</p>
    </div>
  </section>

  <!-- ===== Message Form ===== -->
  <main class="main-content">
    <div id="mbLocalWarning" class="local-warning" style="display:none;">
      当前为本地模式：留言仅保存在本浏览器中，其他设备无法看到。如需所有人可见，请配置 Supabase 后端（参见
      <a href="https://github.com/xiaxiadayo/xiaxiadayo.github.io#readme">README</a>）。
    </div>

    <form id="mbForm" class="mb-form" autocomplete="off">
      <div class="mb-form-row">
        <label for="mbAuthor">署名</label>
        <input type="text" id="mbAuthor" placeholder="你的名字" required />
      </div>
      <div class="mb-form-row">
        <label for="mbContent">留言内容</label>
        <textarea id="mbContent" rows="5" placeholder="写下你想说的话…" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">发布留言</button>
    </form>

    <!-- ===== Message List ===== -->
    <div id="mbList" class="mb-list"></div>
    <div id="mbPagination" class="mb-pagination"></div>
  </main>

  <!-- ===== Toast ===== -->
  <div id="mbToast" class="mb-toast"></div>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <p>© 2024 – 2026 xiaxiadayo</p>
  </footer>

  <!-- ===== Scripts ===== -->
  <script src="/config.js"></script>
  <script src="/assets/js/messageboard.js" defer></script>
  <script>
    // Navbar scroll shadow
    window.addEventListener('scroll', function () {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
</body>
</html>
